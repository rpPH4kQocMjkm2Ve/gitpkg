name: CI

on:
  push:
    paths:
      - 'gitpkg'
      - 'lib/**'
      - 'tests/*.sh'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'gitpkg'
      - 'lib/**'
      - 'tests/*.sh'
      - '.github/workflows/ci.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          shellcheck -s bash -e SC1090,SC1091,SC2034,SC2115,SC2153,SC2178 gitpkg
          shellcheck -s bash -e SC1090,SC1091,SC1113,SC2034,SC2096,SC2153,SC2178 lib/common.sh
          shellcheck -s bash -e SC1090,SC1091,SC1113,SC2034,SC2096,SC2153,SC2178 lib/sandbox.sh
          shellcheck -s bash -e SC1090,SC1091,SC1113,SC2034,SC2096,SC2153,SC2178 lib/package.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/test.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap
      - name: Run integration tests
        run: sudo bash tests/test_integration.sh
